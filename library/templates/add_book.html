{% extends 'base.html' %}
{% block title %}Add Book - LMS{% endblock %}

{% block content %}
<h2>Add New Book</h2>
<form method="post" style="max-width: 480px;">
    {% csrf_token %}
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" required placeholder="Book title">

    <label for="author">Author:</label>
    <input type="text" id="author" name="author" required placeholder="Author name">

    <label for="isbn">ISBN:  </label>
    <input type="text" id="isbn" name="isbn" required placeholder="13-digit ISBN" maxlength="13">

    <input type="submit" value="Add Book">
    <a href="{% url 'dashboard' %}" style="margin-left: 12px;">Cancel</a>
</form>
{% endblock %}
