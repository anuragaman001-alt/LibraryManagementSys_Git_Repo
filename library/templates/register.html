{% extends 'base.html' %}
{% block title %}Register - LMS{% endblock %}

{% block content %}
<div class="auth-box">
    <h2>Create Account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Register">
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
