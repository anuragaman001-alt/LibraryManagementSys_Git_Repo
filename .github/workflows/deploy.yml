name: CI/CD Django App

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # 🔍 JOB 1: Code Quality + Security Checks
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint pylint-django bandit pip-audit

      # - name: Run Flake8
      #   run: flake8 library/ lms_project/ --max-line-length=120

      - name: Run Pylint
        run: |
          pylint library/ lms_project/ \
            --load-plugins pylint_django \
            --django-settings-module=lms_project.settings \
            --fail-under=8.0

      - name: Run Bandit (Security Scan)
        run: bandit -r library/ lms_project/ -ll --exclude ./venv

      - name: Run pip-audit (Dependency Scan)
        run: pip-audit

  # 🚀 JOB 2: Deploy (only if checks pass)
  deploy:
    needs: checks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          cd ${{ secrets.PROJECT_PATH }}

          echo "📥 Pull latest code"
          git pull origin main

          echo "🐍 Activate venv"
          source venv/bin/activate

          echo "📦 Install dependencies"
          pip install -r requirements.txt

          echo "⚙️ Run migrations"
          python manage.py migrate

          echo "📁 Collect static"
          python manage.py collectstatic --noinput

          echo "🔄 Restart Gunicorn"
          sudo systemctl restart gunicorn

          echo "🌐 Restart Nginx"
          sudo systemctl restart nginx

          echo "✅ Deployment done"
          EOF